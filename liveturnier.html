<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>K.O. Turnier Live</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f172a;--bg-card:#1e293b;--bg-hover:#334155;--text:#f1f5f9;--text-muted:#94a3b8;--blue:#3b82f6;--green:#4ade80;--red:#f87171;--amber:#fbbf24}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1rem}
.container{max-width:600px;margin:0 auto}
.header{background:var(--bg-card);border-radius:16px;padding:1rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem}
.title{font-size:1.5rem;font-weight:800;color:var(--blue)}
.subtitle{font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem}
.btn{padding:0.5rem 1rem;border-radius:8px;border:none;font-weight:600;font-size:0.875rem;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--blue);color:white}
.btn-primary:hover{opacity:0.9}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{background:var(--bg-hover);color:var(--text)}
.btn-sm{padding:0.375rem 0.75rem;font-size:0.75rem}
.tabs{display:flex;gap:0.5rem;background:var(--bg-card);border-radius:12px;padding:0.5rem;margin-bottom:1rem}
.tab{flex:1;padding:0.75rem;border-radius:8px;background:transparent;border:none;color:var(--text-muted);font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{background:var(--blue);color:white}
.tab-content{display:none}
.tab-content.active{display:block}
.match-card{background:var(--bg-card);border-radius:12px;padding:1rem;margin-bottom:0.75rem;transition:all .2s}
.match-card:hover{transform:translateY(-2px)}
.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;font-size:0.75rem;color:var(--text-muted)}
.match-id{font-weight:800;color:var(--amber)}
.team{font-weight:600}
.team.placeholder{color:var(--text-muted);font-style:italic}
.vs-divider{color:var(--text-muted);font-weight:800}
.score-display{font-size:1.5rem;font-weight:800;color:var(--green)}
.status{display:inline-block;padding:0.25rem 0.5rem;border-radius:6px;font-size:0.625rem;font-weight:700;text-transform:uppercase}
.status-waiting{background:rgba(251,191,36,0.2);color:var(--amber)}
.status-done{background:rgba(148,163,184,0.2);color:var(--text-muted)}
.round-section{margin-bottom:1.5rem}
.round-title{font-size:1rem;font-weight:800;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.5rem}
.bracket-section{background:var(--bg-card);border-radius:12px;padding:1rem;margin-bottom:1rem}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--bg-card);border-radius:16px;padding:1.5rem;max-width:400px;width:90%}
.modal-title{font-size:1.25rem;font-weight:800;margin-bottom:1rem}
.input-group{margin-bottom:1rem}
.input-group label{display:block;font-size:0.875rem;font-weight:600;margin-bottom:0.5rem;color:var(--text-muted)}
.input-group input{width:100%;padding:0.75rem;background:var(--bg-hover);border:1px solid var(--bg-hover);border-radius:8px;color:var(--text);font-size:1rem}
.focus-highlight{border:2px solid var(--green);box-shadow:0 0 12px rgba(74,222,128,0.3)}
.pw-unlocked{background:rgba(74,222,128,0.2);color:var(--green)}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div>
<div class="title" id="tournamentName">K.O. Turnier</div>
<div class="subtitle" id="tournamentMeta"></div>
</div>
<div style="display:flex;gap:0.5rem;align-items:center">
<button class="btn btn-secondary btn-sm" onclick="refresh()" title="Aktualisieren">🔄</button>
<button class="btn btn-secondary btn-sm" onclick="toggleFocus()" id="focusBtn" title="Fokus">👤</button>
<button class="btn btn-secondary btn-sm" onclick="showPasswordStatus()" id="pwBtn" title="Passwort">🔒</button>
</div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('matches')">🎯 Spiele</button>
<button class="tab" onclick="switchTab('bracket')">🌳 Baum</button>
</div>

<div class="tab-content active" id="matchesTab">
<div id="matchesArea"></div>
</div>

<div class="tab-content" id="bracketTab">
<div style="background:var(--bg-card);padding:1rem;border-radius:12px;margin-bottom:1rem;color:var(--text-muted);font-size:0.875rem">
📱 Für beste Ansicht Handy im Querformat nutzen
</div>
<div id="bracketArea"></div>
</div>

<div class="modal" id="passwordModal">
<div class="modal-content">
<div class="modal-title">🔒 Passwort erforderlich</div>
<div class="input-group">
<label>Admin-Passwort</label>
<input type="password" id="passwordInput" placeholder="Passwort eingeben">
</div>
<div style="display:flex;gap:0.5rem">
<button class="btn btn-primary" style="flex:1" onclick="checkPassword()">OK</button>
<button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Abbrechen</button>
</div>
</div>
</div>

<div class="modal" id="scoreModal">
<div class="modal-content">
<div class="modal-title">Score eingeben</div>
<div id="scoreMatchInfo" style="margin-bottom:1rem;color:var(--text-muted);font-size:0.875rem"></div>
<div class="input-group">
<label>Score (z.B. 21:15)</label>
<div style="display:flex;gap:0.5rem;align-items:center;justify-content:center">
<input type="number" id="score1" placeholder="21" min="0" max="99" style="width:80px;text-align:center;font-size:1.5rem;font-weight:800">
<span style="font-weight:800;font-size:1.5rem">:</span>
<input type="number" id="score2" placeholder="15" min="0" max="99" style="width:80px;text-align:center;font-size:1.5rem;font-weight:800">
</div>
</div>
<div style="display:flex;gap:0.5rem">
<button class="btn btn-primary" style="flex:1" onclick="saveScore()">✅ Speichern</button>
<button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Abbrechen</button>
</div>
</div>
</div>

<script>
const SB_URL="https://vjcvchczbyvhweiwrunp.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqY3ZjaGN6Ynl2aHdlaXdydW5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NjkzNjYsImV4cCI6MjA4NTM0NTM2Nn0.A01bxl9dNzgmeDcOV2HZIIa2pN5vhWg3q0_FhqO1R2M";
const supabaseClient=supabase.createClient(SB_URL,SB_KEY);

let tournamentData=null,tournamentId=null,currentPassword=null,pendingMatchId=null,focusPlayer=null;

async function init(){
const params=new URLSearchParams(window.location.search);
tournamentId=params.get('id');
if(!tournamentId){alert('Kein Turnier ausgewählt');return}
const savedPw=sessionStorage.getItem('ko_password_'+tournamentId);
if(savedPw)currentPassword=savedPw;
await loadTournament();
updatePasswordButton();
setInterval(()=>loadTournament(),30000);
}

async function loadTournament(){
try{
const{data,error}=await supabaseClient.from('tournaments').select('*').eq('id',tournamentId).single();
if(error)throw error;
tournamentData=data.data;
document.getElementById('tournamentName').textContent=tournamentId.toUpperCase();
document.getElementById('tournamentMeta').textContent=`${tournamentData.koTeamCount} Teams · ${tournamentData.koCourts} Courts · Start: ${tournamentData.koStartTime}`;
ensureR1Placeholders();
ensureHFPlaceholders();
ensureFinalsPlaceholders();
renderMatches();
renderBracket();
}catch(e){alert('Fehler: '+e.message)}
}

function switchTab(tab){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
event.target.classList.add('active');
document.getElementById(tab+'Tab').classList.add('active');
}

function teamId(team){
if(!team)return null;
if(team.a&&team.b)return`${team.a}_${team.b}`;
return JSON.stringify(team);
}

function teamLabel(team){
if(!team)return'?';
if(team.a&&team.b)return`${team.a}/${team.b}`;
if(team.name)return team.name;
if(team.outlook)return team.outlook;
return'Wartet...';
}

function getWinner(match){
if(!match||match.score1==null||match.score2==null)return null;
return match.score1>match.score2?match.team1:match.team2;
}

function getLoser(match){
if(!match||match.score1==null||match.score2==null)return null;
return match.score1>match.score2?match.team2:match.team1;
}

function addMinutes(time,minutes){
const[h,m]=time.split(':').map(Number);
const totalMin=h*60+m+minutes;
return`${Math.floor(totalMin/60).toString().padStart(2,'0')}:${(totalMin%60).toString().padStart(2,'0')}`;
}

function getMatchTimes(match){
const startTime=match.time||'--:--';
const matchDuration=tournamentData.koMatchTime||30;
if(startTime==='--:--')return{start:startTime,end:'--:--',duration:matchDuration};
const endTime=addMinutes(startTime,matchDuration);
return{start:startTime,end:endTime,duration:matchDuration};
}

function fillRound1(){
const bracket=tournamentData.koBracket.mainBracket;
if(!bracket.r1)bracket.r1=[];

const prelim=tournamentData.koBracket.prelimMatches;
const start=tournamentData.koStartTime||'09:00';
const dur=(tournamentData.koMatchTime||30)+(tournamentData.koPause||5);

// R1a: Winner V1 vs Winner V2 - kann gefüllt werden sobald V1+V2 fertig
if(!bracket.r1[0])bracket.r1[0]={id:'R1a',court:2,score1:null,score2:null,time:addMinutes(start,1*dur)};
const v1Done=prelim[0]&&prelim[0].score1!=null;
const v2Done=prelim[1]&&prelim[1].score1!=null;
if(v1Done&&v2Done){
bracket.r1[0].team1=getWinner(prelim[0]);
bracket.r1[0].team2=getWinner(prelim[1]);
}else{
bracket.r1[0].team1={outlook:'Winner V1'};
bracket.r1[0].team2={outlook:'Winner V2'};
}

// R1b: Winner V3 vs Loser V1 - kann gefüllt werden sobald V1+V3 fertig
if(!bracket.r1[1])bracket.r1[1]={id:'R1b',court:3,score1:null,score2:null,time:addMinutes(start,1*dur)};
const v3Done=prelim[2]&&prelim[2].score1!=null;
if(v1Done&&v3Done){
bracket.r1[1].team1=getWinner(prelim[2]);
bracket.r1[1].team2=getLoser(prelim[0]);
}else{
bracket.r1[1].team1={outlook:'Winner V3'};
bracket.r1[1].team2={outlook:'Loser V1'};
}

// R1c: Loser V2 vs Loser V3 - braucht V2+V3
if(!bracket.r1[2])bracket.r1[2]={id:'R1c',court:1,score1:null,score2:null,time:addMinutes(start,2*dur)};
if(v2Done&&v3Done){
bracket.r1[2].team1=getLoser(prelim[1]);
bracket.r1[2].team2=getLoser(prelim[2]);
}else{
bracket.r1[2].team1={outlook:'Loser V2'};
bracket.r1[2].team2={outlook:'Loser V3'};
}

// R1d: Winner V4 vs Loser V4 - braucht V4 (Wildcard!)
if(!bracket.r1[3])bracket.r1[3]={id:'R1d',court:2,score1:null,score2:null,time:addMinutes(start,2*dur)};
const v4Done=prelim[3]&&prelim[3].score1!=null;
if(v4Done){
bracket.r1[3].team1=getWinner(prelim[3]);
bracket.r1[3].team2=getLoser(prelim[3]);
}else{
bracket.r1[3].team1={outlook:'Winner V4'};
bracket.r1[3].team2={outlook:'Loser V4'};
}
}

function ensureR1Placeholders(){
const bracket=tournamentData.koBracket.mainBracket;
if(!bracket.r1)bracket.r1=[];
if(bracket.r1.length>0)return;

const start=tournamentData.koStartTime||'09:00';
const dur=(tournamentData.koMatchTime||30)+(tournamentData.koPause||5);

bracket.r1=[
{id:'R1a',court:2,team1:{outlook:'Winner V1'},team2:{outlook:'Winner V2'},score1:null,score2:null,time:addMinutes(start,1*dur)},
{id:'R1b',court:3,team1:{outlook:'Winner V3'},team2:{outlook:'Loser V1'},score1:null,score2:null,time:addMinutes(start,1*dur)},
{id:'R1c',court:1,team1:{outlook:'Loser V2'},team2:{outlook:'Loser V3'},score1:null,score2:null,time:addMinutes(start,2*dur)},
{id:'R1d',court:2,team1:{outlook:'Winner V4'},team2:{outlook:'Loser V4'},score1:null,score2:null,time:addMinutes(start,2*dur)}
];
}

function ensureHFPlaceholders(){
const bracket=tournamentData.koBracket.mainBracket;
if(!bracket.hf)bracket.hf=[];
if(!bracket.chf)bracket.chf=[];
if(bracket.hf.length>0)return;

const start=tournamentData.koStartTime||'09:00';
const dur=(tournamentData.koMatchTime||30)+(tournamentData.koPause||5);

bracket.hf=[
{id:'HF1',court:1,team1:{outlook:'Winner R1a'},team2:{outlook:'Winner R1b'},score1:null,score2:null,time:addMinutes(start,3*dur)},
{id:'HF2',court:2,team1:{outlook:'Winner R1c'},team2:{outlook:'Winner R1d'},score1:null,score2:null,time:addMinutes(start,3*dur)}
];

bracket.chf=[
{id:'CHF1',court:3,team1:{outlook:'Loser R1a'},team2:{outlook:'Loser R1b'},score1:null,score2:null,time:addMinutes(start,2*dur)},
{id:'CHF2',court:4,team1:{outlook:'Loser R1c'},team2:{outlook:'Loser R1d'},score1:null,score2:null,time:addMinutes(start,3*dur)}
];
}

function ensureFinalsPlaceholders(){
const bracket=tournamentData.koBracket.mainBracket;
if(!bracket.finals)bracket.finals=[];
if(bracket.finals.length>0)return;

const start=tournamentData.koStartTime||'09:00';
const dur=(tournamentData.koMatchTime||30)+(tournamentData.koPause||5);

bracket.finals=[
{id:'FINALE',court:2,team1:{outlook:'Winner HF1'},team2:{outlook:'Winner HF2'},score1:null,score2:null,time:addMinutes(start,5*dur)},
{id:'KLF',court:1,team1:{outlook:'Loser HF1'},team2:{outlook:'Loser HF2'},score1:null,score2:null,time:addMinutes(start,5*dur)},
{id:'CF',court:1,team1:{outlook:'Winner CHF1'},team2:{outlook:'Winner CHF2'},score1:null,score2:null,time:addMinutes(start,4*dur)},
{id:'CKF',court:2,team1:{outlook:'Loser CHF1'},team2:{outlook:'Loser CHF2'},score1:null,score2:null,time:addMinutes(start,4*dur)}
];
}

function fillSemiFinals(){
const b=tournamentData.koBracket.mainBracket;
const r1=b.r1||[];
if(!b.hf)b.hf=[];
if(!b.chf)b.chf=[];

const w=r1.map(getWinner);
const l=r1.map(getLoser);

// HF1: Winner R1a vs Winner R1b (braucht R1a + R1b fertig)
if(w[0]&&w[1]){
if(!b.hf[0])b.hf[0]={id:'HF1',court:1,score1:null,score2:null};
b.hf[0].team1=w[0];
b.hf[0].team2=w[1];
}else if(!b.hf[0]){
b.hf[0]={id:'HF1',court:1,team1:{outlook:'Winner R1a'},team2:{outlook:'Winner R1b'},score1:null,score2:null};
}

// HF2: Winner R1c vs Winner R1d (braucht R1c + R1d fertig)
if(w[2]&&w[3]){
if(!b.hf[1])b.hf[1]={id:'HF2',court:2,score1:null,score2:null};
b.hf[1].team1=w[2];
b.hf[1].team2=w[3];
}else if(!b.hf[1]){
b.hf[1]={id:'HF2',court:2,team1:{outlook:'Winner R1c'},team2:{outlook:'Winner R1d'},score1:null,score2:null};
}

// CHF1: Loser R1a vs Loser R1b (braucht R1a + R1b fertig) - WICHTIG FÜR SLOT 3!
if(l[0]&&l[1]){
if(!b.chf[0])b.chf[0]={id:'CHF1',court:3,score1:null,score2:null};
b.chf[0].team1=l[0];
b.chf[0].team2=l[1];
}else if(!b.chf[0]){
b.chf[0]={id:'CHF1',court:3,team1:{outlook:'Loser R1a'},team2:{outlook:'Loser R1b'},score1:null,score2:null};
}

// CHF2: Loser R1c vs Loser R1d (braucht R1c + R1d fertig)
if(l[2]&&l[3]){
if(!b.chf[1])b.chf[1]={id:'CHF2',court:4,score1:null,score2:null};
b.chf[1].team1=l[2];
b.chf[1].team2=l[3];
}else if(!b.chf[1]){
b.chf[1]={id:'CHF2',court:4,team1:{outlook:'Loser R1c'},team2:{outlook:'Loser R1d'},score1:null,score2:null};
}

const start=tournamentData.koStartTime||'09:00';
const dur=(tournamentData.koMatchTime||30)+(tournamentData.koPause||5);
[b.chf[0]].forEach(m=>{if(m)m.time=addMinutes(start,2*dur)});
[b.hf[0],b.hf[1],b.chf[1]].forEach(m=>{if(m)m.time=addMinutes(start,3*dur)});
}

function fillFinals(){
const b=tournamentData.koBracket.mainBracket;
if(!b.finals)b.finals=[];

const hw=b.hf.map(getWinner);
const hl=b.hf.map(getLoser);
const cw=(b.chf||[]).map(getWinner);
const cl=(b.chf||[]).map(getLoser);

if(hw[0]&&hw[1]){if(!b.finals[0])b.finals[0]={id:'FINALE',court:2,score1:null,score2:null};b.finals[0].team1=hw[0];b.finals[0].team2=hw[1];}
if(hl[0]&&hl[1]){if(!b.finals[1])b.finals[1]={id:'KLF',court:1,score1:null,score2:null};b.finals[1].team1=hl[0];b.finals[1].team2=hl[1];}
if(cw[0]&&cw[1]){if(!b.finals[2])b.finals[2]={id:'CF',court:1,score1:null,score2:null};b.finals[2].team1=cw[0];b.finals[2].team2=cw[1];}
if(cl[0]&&cl[1]){if(!b.finals[3])b.finals[3]={id:'CKF',court:2,score1:null,score2:null};b.finals[3].team1=cl[0];b.finals[3].team2=cl[1];}

const start=tournamentData.koStartTime||'09:00';
const dur=(tournamentData.koMatchTime||30)+(tournamentData.koPause||5);
[b.finals[2],b.finals[3]].forEach(m=>{if(m)m.time=addMinutes(start,4*dur)});
[b.finals[0],b.finals[1]].forEach(m=>{if(m)m.time=addMinutes(start,5*dur)});
}

function allPrelimDone(){return tournamentData.koBracket.prelimMatches.every(m=>m.score1!=null&&m.score2!=null)}
function allR1Done(){const r1=tournamentData.koBracket.mainBracket.r1||[];return r1.length>0&&r1.every(m=>m.score1!=null&&m.score2!=null)}
function allHFDone(){const hf=tournamentData.koBracket.mainBracket.hf||[];const chf=tournamentData.koBracket.mainBracket.chf||[];return hf.length>0&&hf.every(m=>m.score1!=null&&m.score2!=null)&&chf.length>0&&chf.every(m=>m.score1!=null&&m.score2!=null)}

function renderMatches(){
const bracket=tournamentData.koBracket;
if(!bracket){document.getElementById('matchesArea').innerHTML='<p>Kein Bracket</p>';return}

const slots=[];

const slot1Matches=bracket.prelimMatches?.slice(0,3)||[];
if(slot1Matches.length){
slots.push({
title:'⏱️ Slot 1: Vorrunde (3 Spiele parallel)',
time:slot1Matches[0]?.time||'--:--',
matches:slot1Matches
});
}

const slot2Matches=[];
if(bracket.prelimMatches?.[3])slot2Matches.push(bracket.prelimMatches[3]);
const r1=bracket.mainBracket?.r1||[];
if(r1[0])slot2Matches.push(r1[0]);
if(r1[1])slot2Matches.push(r1[1]);
if(slot2Matches.length){
const firstTime=slot2Matches[0]?.time||'--:--';
slots.push({
title:'⏱️ Slot 2: V4 + Runde 1 (3 Spiele parallel)',
time:firstTime,
matches:slot2Matches
});
}

const slot3Matches=[];
const chf=bracket.mainBracket?.chf||[];
if(chf[0])slot3Matches.push(chf[0]);
if(r1[2])slot3Matches.push(r1[2]);
if(r1[3])slot3Matches.push(r1[3]);
if(slot3Matches.length){
const firstTime=slot3Matches[0]?.time||'--:--';
slots.push({
title:'⏱️ Slot 3: Runde 1 (2 Spiele) + CHF1',
time:firstTime,
matches:slot3Matches
});
}

const slot4Matches=[];
const hf=bracket.mainBracket?.hf||[];
hf.forEach(m=>{if(m&&m.team1)slot4Matches.push(m)});
if(chf[1]&&chf[1].team1)slot4Matches.push(chf[1]);
if(slot4Matches.length){
const firstTime=slot4Matches[0]?.time||'--:--';
slots.push({
title:'⏱️ Slot 4: Halbfinale',
time:firstTime,
matches:slot4Matches
});
}

const finals=bracket.mainBracket?.finals||[];
const slot5Matches=finals.filter(m=>m&&m.team1&&(m.id==='CF'||m.id==='CKF'));
if(slot5Matches.length){
const firstTime=slot5Matches[0]?.time||'--:--';
slots.push({
title:'⏱️ Slot 5: Consolation Finals',
time:firstTime,
matches:slot5Matches
});
}

const slot6Matches=finals.filter(m=>m&&m.team1&&(m.id==='FINALE'||m.id==='KLF'));
if(slot6Matches.length){
const firstTime=slot6Matches[0]?.time||'--:--';
slots.push({
title:'⏱️ Slot 6: Finale',
time:firstTime,
matches:slot6Matches
});
}

let html='';
slots.forEach(slot=>{
const times=getMatchTimes(slot.matches[0]);
html+=`<div class="round-section">
<div class="round-title">${slot.title}</div>
<div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.75rem">
🕐 ${times.start} - ${times.end}
</div>`;
slot.matches.forEach(m=>{
html+=renderMatchCard(m,m.score1!=null?'done':'waiting');
});
html+=`</div>`;
});

document.getElementById('matchesArea').innerHTML=html||'<p style="text-align:center;color:var(--text-muted);padding:2rem">Keine Spiele</p>';
}

function renderMatchCard(match,status){
const team1=teamLabel(match.team1);
const team2=teamLabel(match.team2);
const isPlaceholder=team1.includes('Winner')||team1.includes('Loser')||team1.includes('Wartet');
const hasScore=match.score1!=null&&match.score2!=null;
const isFocused=focusPlayer&&(team1.includes(focusPlayer)||team2.includes(focusPlayer));

const times=getMatchTimes(match);
const courtNames=tournamentData.koCourtNames||[];
const courtLabel=courtNames[match.court-1]||match.court;

return`<div class="match-card ${isFocused?'focus-highlight':''}">
<div class="match-header">
<span class="match-id">${match.id}</span>
<span class="status status-${status}">${status==='done'?'✅ Fertig':'⏳ Wartet'}</span>
</div>
<div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.75rem">
Court ${courtLabel} · ${times.start} - ${times.end} (${times.duration} Min)
</div>
${hasScore?
`<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:0.75rem;margin-bottom:0.5rem">
<div class="team" style="text-align:right">${team1}</div>
<div class="score-display">${match.score1} : ${match.score2}</div>
<div class="team">${team2}</div>
</div>
<button class="btn btn-secondary btn-sm" onclick="openScoreModal('${match.id}')" style="font-size:0.7rem">Score ändern</button>`
:
`<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:0.75rem;margin-bottom:0.75rem">
<div class="team ${isPlaceholder?'placeholder':''}" style="text-align:right">${team1}</div>
<div class="vs-divider">VS</div>
<div class="team ${isPlaceholder?'placeholder':''}">${team2}</div>
</div>
<button class="btn btn-primary btn-sm" onclick="openScoreModal('${match.id}')" ${isPlaceholder?'disabled':''}>Score eintragen</button>`
}
</div>`;
}

function renderBracket(){
const bracket=tournamentData.koBracket;
if(!bracket){document.getElementById('bracketArea').innerHTML='';return}

const w=900,h=700;
const mW=180,mH=50;
const colX=[20,240,460,680];
const prelim=bracket.prelimMatches||[];
const r1=bracket.mainBracket?.r1||[];
const hf=bracket.mainBracket?.hf||[];
const chf=bracket.mainBracket?.chf||[];
const finals=bracket.mainBracket?.finals||[];

let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="background:#0f172a;border-radius:12px;max-width:100%;height:auto">`;

// Title
svg+=`<text x="10" y="20" style="font-size:14px;font-weight:800;fill:#3b82f6">K.O. TURNIER BRACKET</text>`;

// Vorrunde
svg+=`<text x="10" y="50" style="font-size:11px;font-weight:700;fill:#94a3b8">VORRUNDE</text>`;
prelim.forEach((m,i)=>{
const y=65+i*60;
const t1=teamLabel(m.team1);
const t2=teamLabel(m.team2);
const score=m.score1!=null?`${m.score1}:${m.score2}`:'vs';
const w1=m.score1!=null&&m.score1>m.score2;
const w2=m.score1!=null&&m.score2>m.score1;
svg+=`<g transform="translate(10,${y})">
<rect width="200" height="45" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
<text x="8" y="15" style="font-size:10px;font-weight:800;fill:#fbbf24">${m.id}</text>
<text x="8" y="28" style="font-size:10px;fill:${w1?'#4ade80':'#f1f5f9'}">${t1}</text>
<text x="8" y="38" style="font-size:10px;fill:${w2?'#4ade80':'#f1f5f9'}">${t2}</text>
<text x="190" y="33" text-anchor="end" style="font-size:14px;font-weight:800;fill:#4ade80">${score}</text>
</g>`;
});

// R1
svg+=`<text x="230" y="50" style="font-size:11px;font-weight:700;fill:#94a3b8">RUNDE 1</text>`;
r1.forEach((m,i)=>{
const y=65+i*60;
const t1=teamLabel(m.team1);
const t2=teamLabel(m.team2);
const score=m.score1!=null?`${m.score1}:${m.score2}`:'vs';
const w1=m.score1!=null&&m.score1>m.score2;
const w2=m.score1!=null&&m.score2>m.score1;
const isPlaceholder=t1.includes('Winner')||t1.includes('Loser');
svg+=`<g transform="translate(230,${y})">
<rect width="200" height="45" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
<text x="8" y="15" style="font-size:10px;font-weight:800;fill:#3b82f6">${m.id}</text>
<text x="8" y="28" style="font-size:${isPlaceholder?'8':'10'}px;fill:${w1?'#4ade80':isPlaceholder?'#64748b':'#f1f5f9'}">${t1}</text>
<text x="8" y="38" style="font-size:${isPlaceholder?'8':'10'}px;fill:${w2?'#4ade80':isPlaceholder?'#64748b':'#f1f5f9'}">${t2}</text>
<text x="190" y="33" text-anchor="end" style="font-size:14px;font-weight:800;fill:#4ade80">${score}</text>
</g>`;
});

// HF
svg+=`<text x="450" y="50" style="font-size:11px;font-weight:700;fill:#94a3b8">HALBFINALE</text>`;
[...hf,...chf].forEach((m,i)=>{
if(!m)return;
const y=65+i*60;
const t1=teamLabel(m.team1);
const t2=teamLabel(m.team2);
const score=m.score1!=null?`${m.score1}:${m.score2}`:'vs';
const w1=m.score1!=null&&m.score1>m.score2;
const w2=m.score1!=null&&m.score2>m.score1;
const isPlaceholder=t1.includes('Winner')||t1.includes('Loser');
const isCons=m.id.includes('CHF');
svg+=`<g transform="translate(450,${y})">
<rect width="200" height="45" rx="6" fill="#1e293b" stroke="${isCons?'#f87171':'#334155'}" stroke-width="1.5"/>
<text x="8" y="15" style="font-size:10px;font-weight:800;fill:${isCons?'#f87171':'#4ade80'}">${m.id}</text>
<text x="8" y="28" style="font-size:${isPlaceholder?'8':'10'}px;fill:${w1?'#4ade80':isPlaceholder?'#64748b':'#f1f5f9'}">${t1}</text>
<text x="8" y="38" style="font-size:${isPlaceholder?'8':'10'}px;fill:${w2?'#4ade80':isPlaceholder?'#64748b':'#f1f5f9'}">${t2}</text>
<text x="190" y="33" text-anchor="end" style="font-size:14px;font-weight:800;fill:#4ade80">${score}</text>
</g>`;
});

// Finals
svg+=`<text x="670" y="50" style="font-size:11px;font-weight:700;fill:#94a3b8">FINALE</text>`;
finals.forEach((m,i)=>{
if(!m||!m.team1)return;
const y=65+i*60;
const t1=teamLabel(m.team1);
const t2=teamLabel(m.team2);
const score=m.score1!=null?`${m.score1}:${m.score2}`:'vs';
const w1=m.score1!=null&&m.score1>m.score2;
const w2=m.score1!=null&&m.score2>m.score1;
const isPlaceholder=t1.includes('Winner')||t1.includes('Loser');
const isMain=m.id==='FINALE'||m.id==='KLF';
svg+=`<g transform="translate(670,${y})">
<rect width="200" height="45" rx="6" fill="#1e293b" stroke="${isMain?'#fbbf24':'#f87171'}" stroke-width="2"/>
<text x="8" y="15" style="font-size:10px;font-weight:800;fill:${isMain?'#fbbf24':'#f87171'}">${m.id==='FINALE'?'🥇 '+m.id:m.id==='KLF'?'🥉 '+m.id:m.id}</text>
<text x="8" y="28" style="font-size:${isPlaceholder?'8':'10'}px;fill:${w1?'#4ade80':isPlaceholder?'#64748b':'#f1f5f9'}">${t1}</text>
<text x="8" y="38" style="font-size:${isPlaceholder?'8':'10'}px;fill:${w2?'#4ade80':isPlaceholder?'#64748b':'#f1f5f9'}">${t2}</text>
<text x="190" y="33" text-anchor="end" style="font-size:14px;font-weight:800;fill:#4ade80">${score}</text>
</g>`;
});

svg+=`</svg>`;

document.getElementById('bracketArea').innerHTML=svg;
}

function findMatch(id){
const b=tournamentData.koBracket;
return b.prelimMatches?.find(m=>m.id===id)||
b.mainBracket?.r1?.find(m=>m.id===id)||
b.mainBracket?.hf?.find(m=>m.id===id)||
b.mainBracket?.chf?.find(m=>m.id===id)||
b.mainBracket?.finals?.find(m=>m.id===id);
}

function openScoreModal(matchId){
if(tournamentData.password&&!currentPassword){
pendingMatchId=matchId;
document.getElementById('passwordModal').classList.add('active');
return;
}
pendingMatchId=matchId;
const match=findMatch(matchId);
if(!match)return;
document.getElementById('scoreMatchInfo').textContent=`${match.id}: ${teamLabel(match.team1)} vs ${teamLabel(match.team2)}`;
document.getElementById('score1').value='';
document.getElementById('score2').value='';
document.getElementById('scoreModal').classList.add('active');
document.getElementById('score1').focus();
}

async function saveScore(){
const s1=parseInt(document.getElementById('score1').value);
const s2=parseInt(document.getElementById('score2').value);
if(isNaN(s1)||isNaN(s2)){alert('Bitte gültige Scores');return}

const match=findMatch(pendingMatchId);
if(!match)return;

match.score1=s1;
match.score2=s2;

// IMMER updaten (füllt was möglich ist)
fillRound1();
fillSemiFinals(); // CHF1 kann schon nach R1a+R1b gefüllt werden!

if(allHFDone()){
fillFinals();
}

try{
const{error}=await supabaseClient.from('tournaments').update({data:tournamentData}).eq('id',tournamentId);
if(error)throw error;
closeModal();
renderMatches();
renderBracket();
}catch(e){alert('Fehler: '+e.message)}
}

function checkPassword(){
const pw=document.getElementById('passwordInput').value;
if(pw===tournamentData.password){
currentPassword=pw;
sessionStorage.setItem('ko_password_'+tournamentId,pw);
closeModal();
updatePasswordButton();
if(pendingMatchId)openScoreModal(pendingMatchId);
}else{
alert('Falsches Passwort!');
}
}

function updatePasswordButton(){
const btn=document.getElementById('pwBtn');
if(currentPassword){
btn.classList.add('pw-unlocked');
btn.textContent='🔓';
btn.title='Entsperrt';
}else{
btn.classList.remove('pw-unlocked');
btn.textContent='🔒';
btn.title='Gesperrt';
}
}

function showPasswordStatus(){
if(currentPassword){
if(confirm('Passwort vergessen?')){
currentPassword=null;
sessionStorage.removeItem('ko_password_'+tournamentId);
updatePasswordButton();
}
}else{
document.getElementById('passwordModal').classList.add('active');
}
}

function toggleFocus(){
const player=prompt('Spielername:');
if(player){
focusPlayer=player;
document.getElementById('focusBtn').textContent=`👤 ${player}`;
renderMatches();
}else{
focusPlayer=null;
document.getElementById('focusBtn').textContent='👤';
renderMatches();
}
}

function closeModal(){
document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
document.getElementById('passwordInput').value='';
}

function refresh(){
loadTournament();
}

init();
</script>
</body>
</html>
